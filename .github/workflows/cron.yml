name: pipeline-cron
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      BASE: ${{ secrets.DEPLOY_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Ingest
        run: curl -fsS "$BASE/api/cron/ingest" -H "Authorization: Bearer $CRON_SECRET"
      - name: Cluster
        run: curl -fsS "$BASE/api/cron/cluster" -H "Authorization: Bearer $CRON_SECRET"
      - name: Research
        run: curl -fsS --max-time 120 "$BASE/api/cron/research" -H "Authorization: Bearer $CRON_SECRET" || true
